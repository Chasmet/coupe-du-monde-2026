<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08111f">
<title>Coupe du Monde 2026</title>
<link rel="manifest" href="manifest.json?v=18">
<link rel="icon" href="icon.svg?v=18" type="image/svg+xml">
<link rel="stylesheet" href="style.css?v=18">
<link rel="stylesheet" href="bracket-pro.css?v=18">
</head>
<body>
<div class="app-shell">
<header class="hero">
<div class="brand-row">
<img src="icon.svg?v=18" class="app-logo" alt="Logo Coupe du Monde 2026">
<div>
<p class="eyebrow">Dernière mise à jour</p>
<h1>Coupe du Monde 2026</h1>
<p class="subtitle">66 matchs terminés • groupes, qualifiés et phase finale.</p>
</div>
</div>
<div class="hero-actions">
<button class="btn primary" id="newTournamentBtn">Recharger officiel</button>
<button class="btn ghost" id="resetBtn">Réinitialiser</button>
</div>
</header>
<section class="dashboard" aria-label="Tableau de bord">
<article class="stat-card"><span class="stat-label">Progression</span><strong id="progressText">92%</strong><div class="bar"><span id="progressBar"></span></div></article>
<article class="stat-card"><span class="stat-label">Matchs joués</span><strong id="matchesText">66/72</strong></article>
<article class="stat-card"><span class="stat-label">Groupes terminés</span><strong id="groupsText">9/12</strong></article>
</section>
<nav class="tabs" aria-label="Navigation">
<button class="tab active" data-tab="groups">Groupes</button>
<button class="tab" data-tab="qualified">Qualifiés</button>
<button class="tab" data-tab="knockout">Phase finale</button>
<button class="tab" data-tab="champion">Champion</button>
</nav>
<main>
<section id="groupsView" class="view active-view"></section>
<section id="qualifiedView" class="view"></section>
<section id="knockoutView" class="view"></section>
<section id="championView" class="view"></section>
</main>
</div>
<script defer src="script.js?v=18"></script>
<script defer src="bracket-pro.js?v=18"></script>
</body>
</html>
